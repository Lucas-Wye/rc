# theme = "everforest_light_hard"
# theme = "everforest_light_medium"
theme = "everforest_light_soft"

[editor]
mouse = false
rulers = [97]
cursorline = true
cursorcolumn = true
bufferline = "multiple"
line-number = "relative"

[editor.soft-wrap]
enable = true
wrap-indicator = "↩ "

[editor.whitespace.render]
space = "all"
tab = "all"
newline = "none"

[editor.whitespace.characters]
space = " "
nbsp = "⍽"    # Non Breaking SPace
tab = "→"
newline = "⏎"
tabpad = "·"  # Tabs will look like "→···" (depending on tab width)

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = [ "mode", "file-name", "file-modification-indicator", "spinner", "diagnostics" ]
right = [ "selections","position", "position-percentage", "total-line-numbers" ]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

[editor.indent-guides]
render = true
character = "|" 
skip-levels = 1

[editor.file-picker]
hidden = false

[keys.normal]
space.h = "jump_view_left"
space.j = "jump_view_down"
space.k = "jump_view_up"
space.l = "jump_view_right"

C-h = "select_references_to_symbol_under_cursor"
C-j = "jumplist_picker"
C-k = "hover"

space.f = "file_picker_in_current_directory"
space.F = "file_picker"
