# theme = "everforest_light_hard"
# theme = "everforest_light_medium"
theme = "everforest_light_soft"

[editor]
line-number = "relative"
mouse = false
rulers = [97]
cursorline = true
cursorcolumn = true

[editor.whitespace.characters]
space = " "
nbsp = "⍽"    # Non Breaking SPace
tab = "→"
newline = "⏎"
tabpad = "·"  # Tabs will look like "→···" (depending on tab width)

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = [ "mode", "file-name", "spinner", "diagnostics" ]
right = [ "position", "position-percentage", "total-line-numbers" ]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"
