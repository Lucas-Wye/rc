patch:
  schema_list:
    - {schema: double_pinyin_flypy}
  # 候选词个数
  menu/page_size: 6
  # 水平候选词
  style/horizontal: true
  # 按 CapsLock 输出大写英文字母
  ascii_composer/good_old_caps_lock: true
  ascii_composer/switch_key:
    Caps_Lock: clear
    Control_L: noop
    Control_R: noop
    Shift_L: commit_code
    Shift_R: inline_ascii
