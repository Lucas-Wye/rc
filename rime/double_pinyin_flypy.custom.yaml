patch:
  # 载入明月拼音词库
  "translator/dictionary": luna_pinyin
  # 输入双拼码的时候不转化为全拼码
  'translator/preedit_format': {}

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: simplification
    # 设置默认为简体中文
    reset: 1
    states: [ 漢字, 汉字 ]
  - name: ascii_punct