  "preset_keyboards/luna_pinyin_jiugong":
    ascii_mode: 0
    author: "Lustre"
    name: 九宮键盘
    width: 22
    keys:
      - {click: ",", long_click: ".", key_back_color: keyboard_back_color, key_text_color: text_color, width: 17, composing: Up}
      - {click: 1, label: "'", composing: "'"}
      - {click: 2, label: abc, long_click: select_all}
      - {click: 3, label: def, long_click: "#"}
      - {click: ":", long_click: ";", width: 17}

      - {click: "?", long_click: "!", key_back_color: keyboard_back_color, key_text_color: text_color, width: 17, composing: Down}
      - {click: 4, label: ghi, long_click: Home}
      - {click: 5, label: jkl, long_click: "/"}
      - {click: 6, label: mno, long_click: End}
      - {click: "@", long_click: "*", composing: Up, width: 17}

      - {click: BackSpace, key_back_color: bbs, key_text_color: tbs, width: 17}
      - {click: 7, label: pqrs, long_click: copy}
      - {click: 8, label: tuv, long_click: paste}
      - {click: 9, label: wxyz, long_click: cut}
      - {click: Keyboard_defaulten, composing: Down, long_click: '"', width: 17}

      - {click: Return, composing: Return1, width: 17}
      - {click: liquid_keyboard_switch, width: 13, key_back_color: benter, key_text_color: tenter}
      - {click: space, key_back_color: Skyblue, width: 40, long_click: "(){Left}", swipe_left: "(", swipe_right: ")", swipe_up: Up, swipe_down: Down}
      - {click: "0", width: 13}
      - {click: Menu, long_click: Theme_settings, width: 17}

  "preset_keyboards/luna_pinyin_double_key":
    ascii_mode: 0
    author: "Lustre"
    name: "双键双拼"
    ascii_mode: 0
    width: 14
    keys:
      - {label: "q",   click: q, long_click: 1, width: 15}
      - {label: "we", click: w, long_click: 2}
      - {label: "rt", click: r, long_click: 3}
      - {label: "y",   click: y, long_click: 4}
      - {label: "u",   click: u, long_click: 5}
      - {label: "io", click: i, long_click: 6}
      - {label: "p",   click: p, long_click: 7, width: 15}

      - {label: "a",   click: a, long_click: 8}
      - {label: "sd", click: s, long_click: 9}
      - {label: "fg", click: f, long_click: 0}
      - {label: "h",   click: h, long_click: ":"}
      - {label: "jk", click: j, long_click: ";"}
      - {label: "l"  , click: l, long_click: "?"}
      - {click: Keyboard_defaulten, composing: Down, long_click: '"', width: 16}

      - {click: BackSpace, key_back_color: bbs, key_text_color: tbs}
      - {label: "z"  , click: z, long_click: "@"}
      - {label: "xc", click: x, long_click: "!"}
      - {label: "v",   click: v, long_click: "?"}
      - {label: "bn", click: b, long_click: "?"}
      - {label: "m",   click: m, long_click: "."}
      - {click: ":", long_click: ";", width: 8}
      - {click: "?", long_click: "!", width: 8}

      - {click: liquid_keyboard_switch, width: 10, key_back_color: benter, key_text_color: tenter}
      - {click: Return, composing: Return1, width: 15}
      - {click: space, key_back_color: Skyblue, width: 50, long_click: "(){Left}", swipe_left: "(", swipe_right: ")", swipe_up: Up, swipe_down: Down}
