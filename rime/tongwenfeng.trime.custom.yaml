patch:
  "style/auto_caps": ascii
  "style/candidate_text_size": 20

  "liquid_keyboard/keyboards": [math, ascii, cn, history, clipboard, exit]
  "preset_keys/liquid_keyboard_switch": { label: ⌘, send: function, command: liquid_keyboard, option: "常用" }

  "preset_keyboards/default/keys":
    - {click: q, key_back_color: bh1, key_text_color: th1}
    - {click: w, key_back_color: bh1, key_text_color: th1}
    - {click: e, key_back_color: bh1, key_text_color: th1}
    - {click: r, key_back_color: bh1, key_text_color: th1}
    - {click: t, key_back_color: bh1, key_text_color: th1}
    - {click: y, key_back_color: bh1, key_text_color: th1}
    - {click: u, key_back_color: bh1, key_text_color: th1}
    - {click: i, key_back_color: bh1, key_text_color: th1}
    - {click: o, key_back_color: bh1, key_text_color: th1}
    - {click: p, key_back_color: bh1, key_text_color: th1}

    - {width: 5, key_back_color: bh2, key_text_color: th2}
    - {click: a, long_click: select_all, key_back_color: bh2, key_text_color: th2}
    - {click: s, key_back_color: bh2, key_text_color: th2}
    - {click: d, key_back_color: bh2, key_text_color: th2}
    - {click: f, key_back_color: bh2, key_text_color: th2}
    - {click: g, key_back_color: bh2, key_text_color: th2}
    - {click: h, key_back_color: bh2, key_text_color: th2}
    - {click: j, key_back_color: bh2, key_text_color: th2}
    - {click: k, key_back_color: bh2, key_text_color: th2}
    - {click: l, key_back_color: bh2, key_text_color: th2}
    - {width: 5, key_back_color: bh2, key_text_color: th2}

    - {click: BackSpace, width: 15, key_back_color: bbs, key_text_color: tbs}
    - {click: z, key_back_color: bh3, key_text_color: th3}
    - {click: x, long_click: cut, key_back_color: bh3, key_text_color: th3}
    - {click: c, long_click: copy, key_back_color: bh3, key_text_color: th3}
    - {click: v, long_click: paste_clip, key_back_color: bh3, key_text_color: th3}
    - {click: b, key_back_color: bh3, key_text_color: th3}
    - {click: n, key_back_color: bh3, key_text_color: th3}
    - {click: m, key_back_color: bh3, key_text_color: th3}
    - {click: Shift_L, composing: delimiter, width: 15, hilited_key_back_color: benter, key_back_color: bbs, key_text_color: tbs}

    - {click: Keyboard_number, width: 12.5, key_back_color: bgn, key_text_color: tgn}
    - {click: liquid_keyboard_switch, width: 12.5, key_text_size: "18", key_back_color: bgn, key_text_color: tgn}
    - {click: ',', label: '，', key_back_color: bh4, key_text_color: th4}
    - {click: space, width: 30, key_back_color: bkg, key_text_color: tkg}
    - {click: '.', label: '。', key_back_color: bh4, key_text_color: th4}
    - {click: '/', key_text_size: "18", key_back_color: bh4, key_text_color: th4}
    - {click: Return, composing: Return1, width: 15, key_back_color: benter, key_text_color: tenter}

  "preset_keyboards/number/keys":
    - {click: 1}
    - {click: 2}
    - {click: 3}
    - {click: '+', long_click: '#', key_back_color: bgn, key_text_color: tgn}
    - {click: '-', long_click: '%', key_back_color: bgn, key_text_color: tgn}
    - {click: '/', long_click: '\', key_back_color: bgn, key_text_color: tgn}

    - {click: 4}
    - {click: 5}
    - {click: 6}
    - {click: '*', key_back_color: bgn, key_text_color: tgn}
    - {click: '_', long_click: '[]{Left}', key_back_color: bgn, key_text_color: tgn}
    - {click: '(){Left}', key_back_color: bgn, key_text_color: tgn}

    - {click: 7}
    - {click: 8}
    - {click: 9}
    - {click: ., key_back_color: bgn, key_text_color: tgn}
    - {click: '[]{Left}', long_click: '{}{Left}', key_back_color: bgn, key_text_color: tgn}
    - {click: '=', long_click: '≠', key_back_color: bgn, key_text_color: tgn}

    - {click: Keyboard_default, key_back_color: bgn, key_text_color: 'tgn'}
    - {click: BackSpace, key_back_color: bbs, key_text_color: tbs}
    - {click: 0}
    - {click: space1, key_back_color: bgn, key_text_color: tgn}
    - {click: '@', key_back_color: bgn, key_text_color: tgn}
    - {click: Return, key_back_color: benter, key_text_color: tenter}

